<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Monopoly Deal</title>
  <script>
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/');
    var pathAfterBase = l.pathname.slice(base.length);
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?/' +
      pathAfterBase.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash);
  </script>
</head>
</html>
